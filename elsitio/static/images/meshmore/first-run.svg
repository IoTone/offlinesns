<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" width="100%" style="max-width:380px;height:auto;display:block;background:#000000;border-radius:18px;box-shadow:0 0 0 1px #2a2a26 inset">
<!-- Backdrop -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0E0E0C"/>
    <stop offset="1" stop-color="#000000"/>
  </linearGradient>
</defs>
<rect width="360" height="720" fill="url(#bg)" rx="18"/>
<!-- Status bar -->
<text x="20" y="22" fill="#8a847a" font-size="10"
      font-family="Menlo,monospace">9:41</text>
<text x="340" y="22" text-anchor="end" fill="#8a847a"
      font-size="10" font-family="Menlo,monospace">▲ ▲ ░░</text>
<!-- AppBar -->
<rect x="0" y="32" width="360" height="44" fill="#0E0E0C"/>
<text x="16" y="60" fill="#EDE6D6" font-size="16"
      font-family="Inter,Helvetica,sans-serif" font-weight="500">Meshmore SNS</text>
<text x="20" y="96" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400" letter-spacing="3">MESHMORE · WELCOME</text>
<text x="20" y="128" fill="#EDE6D6" font-size="18" font-family="Inter,Helvetica,sans-serif" font-weight="500">Quick heads-up on what we'll ask for</text>
<rect x="20" y="170" width="40" height="40" rx="6" fill="#1a1815"/>
<text x="40" y="197" fill="#EDE6D6" font-size="18" font-family="Inter,Helvetica,sans-serif" font-weight="400" text-anchor="middle">🔵</text>
<text x="72" y="186" fill="#EDE6D6" font-size="13" font-family="Inter,Helvetica,sans-serif" font-weight="500">Bluetooth</text>
<text x="72" y="204" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">To pair with your MeshCore radio and</text>
<text x="72" y="218" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">exchange messages over the local mesh.</text>
<rect x="20" y="260" width="40" height="40" rx="6" fill="#1a1815"/>
<text x="40" y="287" fill="#EDE6D6" font-size="18" font-family="Inter,Helvetica,sans-serif" font-weight="400" text-anchor="middle">🔔</text>
<text x="72" y="276" fill="#EDE6D6" font-size="13" font-family="Inter,Helvetica,sans-serif" font-weight="500">Notifications</text>
<text x="72" y="294" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">Asked only if you turn on "Stay</text>
<text x="72" y="308" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">connected in background" later in App</text>
<text x="72" y="322" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">settings.</text>
<rect x="20" y="350" width="40" height="40" rx="6" fill="#1a1815"/>
<text x="40" y="377" fill="#EDE6D6" font-size="18" font-family="Inter,Helvetica,sans-serif" font-weight="400" text-anchor="middle">☁</text>
<text x="72" y="366" fill="#EDE6D6" font-size="13" font-family="Inter,Helvetica,sans-serif" font-weight="500">Offline is fine</text>
<text x="72" y="384" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">If you skip Bluetooth, the app still</text>
<text x="72" y="398" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">works — browse history, configure</text>
<text x="72" y="412" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">channels, read diagnostics.</text>
<rect x="20" y="524" width="320" height="40" rx="6" fill="#EDE6D6"/>
<text x="180" y="550" fill="#0E0E0C" font-size="12" font-family="Inter,Helvetica,sans-serif" font-weight="400" text-anchor="middle">✓  Grant Bluetooth & continue</text>
<rect x="20" y="576" width="320" height="40" rx="6" fill="none" stroke="#EDE6D6"/>
<text x="180" y="602" fill="#EDE6D6" font-size="12" font-family="Inter,Helvetica,sans-serif" font-weight="400" text-anchor="middle">☁  Continue offline (skip permissions)</text>
</svg>