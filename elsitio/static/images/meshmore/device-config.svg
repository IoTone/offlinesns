<text x="28" y="342" fill="#EDE6D6" font-size="12" font-family="Menlo,monospace" font-weight="400">35.681300</text>
<text x="16" y="376" fill="#8a847a" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400">Advert longitude (°)</text>
