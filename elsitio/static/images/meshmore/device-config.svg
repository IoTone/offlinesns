<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" width="100%" style="max-width:380px;height:auto;display:block;background:#000000;border-radius:18px;box-shadow:0 0 0 1px #2a2a26 inset">
<!-- Backdrop -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0E0E0C"/>
    <stop offset="1" stop-color="#000000"/>
  </linearGradient>
</defs>
<rect width="360" height="720" fill="url(#bg)" rx="18"/>
<!-- Status bar -->
