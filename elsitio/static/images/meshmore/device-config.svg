<rect x="184" y="430" width="160" height="32" rx="4" fill="none" stroke="#EDE6D6"/>
<text x="264" y="451" fill="#EDE6D6" font-size="10" font-family="Inter,Helvetica,sans-serif" font-weight="400" text-anchor="middle">📍 Read device location</text>
<text x="344" y="488" fill="#EDE6D6" font-size="11" font-family="Inter,Helvetica,sans-serif" font-weight="400" text-anchor="end">Set advert location</text>
<line x1="0" y1="510" x2="360" y2="510" stroke="#3b3833" stroke-opacity=".6"/>
<text x="16" y="530" fill="#EDE6D6" font-size="11" font-family="Inter,Helvetica,sans-serif" font-weight="400" letter-spacing="3">DEVICE</text>
