<rect x="0" y="664" width="360" height="56" fill="#0E0E0C" stroke="#3b3833" stroke-opacity=".6" stroke-width="1"/>
<text x="45.0" y="692" fill="#8a847a" font-size="14" text-anchor="middle">⬜</text>
<text x="45.0" y="710" fill="#8a847a" font-size="9" text-anchor="middle" letter-spacing="1">Dashboard</text>
<text x="135.0" y="692" fill="#8a847a" font-size="14" text-anchor="middle">💬</text>
<text x="135.0" y="710" fill="#8a847a" font-size="9" text-anchor="middle" letter-spacing="1">Chat</text>
<text x="225.0" y="692" fill="#8a847a" font-size="14" text-anchor="middle">📡</text>
<text x="225.0" y="710" fill="#8a847a" font-size="9" text-anchor="middle" letter-spacing="1">Nodes</text>
<text x="315.0" y="692" fill="#EDE6D6" font-size="14" text-anchor="middle">⚙</text>
<text x="315.0" y="710" fill="#EDE6D6" font-size="9" text-anchor="middle" letter-spacing="1">Settings</text>
