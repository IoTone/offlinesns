# baseURL = "https://mywebsite.org"
defaultContentLanguage = "ja"
title = "OfflineSNS 日本"
theme = "reveal-hugo"
enableEmoji = true

[languages]
  [languages.ja]
    title = "OfflineSNS 日本"
    languageCode = "ja"
    languageName = "日本語"
    weight = 1
  [languages.en]
    title = "OfflineSNS Japan"
    languageCode = "en"
    languageName = "English"
    weight = 2

[markup.goldmark.renderer]
unsafe = true

[outputFormats.Reveal]
baseName = "index"
mediaType = "text/html"
isHTML = true

# Site-wide custom CSS layered over the active Reveal.js theme.
# Adds `data-state="scrollable"` support so long slides scroll instead
# of clipping. See static/css/custom.css.
[params.reveal_hugo]
custom_css = "css/custom.css"
